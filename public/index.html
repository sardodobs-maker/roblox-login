<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Connexion</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="nav-left">
        <span class="logo">Roblox</span>
        <a>Charts</a>
        <a>Marketplace</a>
        <a>Créer</a>
        <a>Robux</a>
    </div>

</nav>

<!-- BACKGROUND -->
<div class="bg"></div>
<div class="overlay"></div>

<!-- LOGIN CENTER -->
<div class="center">

    <div class="login-box">

        <h2>Ajouter un compte</h2>

        <input id="user" placeholder="Identifiant / Email / Téléphone">
        <input id="pass" type="password" placeholder="Mot de passe">

        <button class="main-btn" onclick="login()">Connexion</button>

        <p class="link">Mot de passe ou nom d'utilisateur oublié ?</p>

        <button class="secondary">Envoyez-moi un code unique par email</button>
        <button class="secondary">Inscription rapide</button>

        <p class="signup-text">
            Vous n'avez pas de compte ? <span>S'inscrire</span>
        </p>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
